<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>5 Nights at Graphische</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --ui-red: #8b0000;
            --ui-green: #006400;
        }

        body {
            font-family: 'VT323', monospace;
            background-color: black;
            user-select: none;
            overflow: hidden;
            margin: 0;
            touch-action: none; 
            width: 100vw;
            height: 100vh;
        }

        /* CRT Overlay Effect */
        .crt-overlay {
            pointer-events: none;
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 255, 0, 0.03));
            background-size: 100% 4px, 3px 100%;
            z-index: 70;
        }

        .crt-vignette {
            pointer-events: none;
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, transparent 40%, rgba(0, 0, 0, 0.9) 100%);
            z-index: 71;
        }

        @keyframes static-noise {
            0% { background-position: 0 0; }
            100% { background-position: 100% 100%; }
        }

        .bg-static {
            background-image: repeating-radial-gradient(circle at 17% 32%, rgba(255,255,255,0.2), rgba(0,0,0,0.3) 0.00085px);
            animation: static-noise 0.2s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translate(0, 0) scale(1); }
            10% { transform: translate(-10px, -10px) scale(1.1); }
            30% { transform: translate(10px, 15px) scale(1.05); }
            50% { transform: translate(-15px, 5px) scale(1.1); }
            70% { transform: translate(15px, -10px) scale(1.15); }
        }

        .jumpscare-anim { animation: shake 0.05s infinite; }

        .door-slide { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .door-open { transform: translateY(-100%); }
        .door-closed { transform: translateY(0); }

        .cam-slide { transition: transform 0.4s ease-in-out; }
        .cam-hidden { transform: translateY(100%); }
        .cam-visible { transform: translateY(0); }

        .room-perspective { perspective: 1000px; }
        
        .touch-btn {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .cam-btn.active {
            background-color: #22c55e;
            color: black;
            box-shadow: 0 0 15px #22c55e;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .animate-blink { animation: blink 1s infinite; }
    </style>
</head>
<body class="text-white relative overflow-hidden">

    <div class="crt-overlay"></div>
    <div class="crt-vignette"></div>

    <!-- Main Menu -->
    <div id="main-menu" class="absolute inset-0 bg-black z-[100] flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-5xl md:text-8xl font-bold mb-4 tracking-tighter text-red-600">5 NIGHTS AT<br>GRAPHISCHE</h1>
        <p class="text-xl mb-12 text-gray-500">Optimized for Mobile</p>
        <button onclick="startGame()" class="touch-btn text-2xl border-2 border-white px-10 py-4 hover:bg-white hover:text-black transition-all font-bold">
            START SHIFT
        </button>
    </div>

    <!-- Win Screen -->
    <div id="win-screen" class="hidden absolute inset-0 bg-black z-[100] flex flex-col items-center justify-center">
        <h1 class="text-8xl font-bold mb-4 text-yellow-500 animate-pulse">6:00 AM</h1>
        <p class="text-2xl mb-8">Shift Completed</p>
        <button onclick="location.reload()" class="touch-btn border border-white px-8 py-2">Continue</button>
    </div>

    <!-- Game UI -->
    <div id="game-container" class="hidden w-full h-full relative bg-gray-950 flex flex-col">
        
        <!-- Top HUD -->
        <div class="absolute top-0 left-0 right-0 p-4 flex justify-between items-start z-50 pointer-events-none">
            <div class="bg-black/50 p-2 border border-gray-800 backdrop-blur-md">
                <p class="text-lg">POWER: <span id="power-display" class="font-bold text-green-400 text-2xl">100%</span></p>
                <div id="usage-display" class="flex gap-1 mt-1"></div>
            </div>
            <div class="bg-black/50 p-2 border border-gray-800 text-right backdrop-blur-md">
                <h2 id="time-display" class="text-3xl font-bold">12:00 AM</h2>
                <p class="text-xs text-gray-400">NIGHT 1</p>
            </div>
        </div>

        <!-- Office View (Takes full space) -->
        <div class="flex-grow relative flex items-center justify-center overflow-hidden room-perspective bg-gray-900">
            <!-- Background View -->
            <div class="w-full h-full flex items-center justify-center relative">
                <!-- Left Doorway -->
                <div class="absolute left-0 top-0 bottom-0 w-[30%] bg-gray-800 border-r-4 border-black relative overflow-hidden">
                    <img id="left-enemy" class="absolute inset-0 w-full h-full object-contain hidden opacity-0 transition-opacity" src="" alt="Enemy">
                    <div id="door-left" class="absolute inset-0 bg-zinc-800 border-b-8 border-black door-slide door-open flex flex-col items-center justify-center gap-4">
                        <div class="w-full h-1 bg-black/20"></div>
                        <div class="w-full h-1 bg-black/20"></div>
                    </div>
                </div>

                <!-- Right Doorway -->
                <div class="absolute right-0 top-0 bottom-0 w-[30%] bg-gray-800 border-l-4 border-black relative overflow-hidden">
                    <img id="right-enemy" class="absolute inset-0 w-full h-full object-contain hidden opacity-0 transition-opacity scale-x-[-1]" src="" alt="Enemy">
                    <div id="door-right" class="absolute inset-0 bg-zinc-800 border-b-8 border-black door-slide door-open flex flex-col items-center justify-center gap-4">
                        <div class="w-full h-1 bg-black/20"></div>
                        <div class="w-full h-1 bg-black/20"></div>
                    </div>
                </div>

                <!-- Desk/Center -->
                <div class="z-10 w-[40%] h-full flex flex-col justify-end items-center pb-0">
                     <div class="w-24 h-24 mb-16 relative animate-spin" style="animation-duration: 0.5s;">
                         <div class="absolute inset-0 border-8 border-gray-700 rounded-full border-t-transparent"></div>
                     </div>
                     <div class="w-full h-32 bg-zinc-900 border-t-4 border-black rounded-t-xl shadow-2xl flex items-center justify-center">
                         <!-- Monitor Button Moved Here: Central between doors -->
                         <button onclick="toggleCamera()" class="touch-btn w-[80%] h-[60%] bg-zinc-800 border-2 border-white flex items-center justify-center font-bold tracking-[0.2em] text-lg hover:bg-white hover:text-black active:scale-95 transition-all shadow-[0_0_15px_rgba(255,255,255,0.2)]">
                            MONITOR
                         </button>
                     </div>
                </div>
            </div>

            <!-- Mobile Door Control Tabs -->
            <button onclick="toggleDoor('left')" id="ctrl-left" class="touch-btn absolute left-0 top-1/2 -translate-y-1/2 w-16 h-48 bg-red-900/40 border-r-4 border-red-500 z-40 rounded-r-xl flex items-center justify-center font-bold text-xs uppercase">Door</button>
            <button onclick="toggleDoor('right')" id="ctrl-right" class="touch-btn absolute right-0 top-1/2 -translate-y-1/2 w-16 h-48 bg-red-900/40 border-l-4 border-red-500 z-40 rounded-l-xl flex items-center justify-center font-bold text-xs uppercase">Door</button>
        </div>

        <!-- Camera Interface (Slide up) -->
        <div id="camera-system" class="absolute inset-0 z-[60] bg-black cam-slide cam-hidden flex flex-col">
            <!-- Feed -->
            <div class="relative flex-grow bg-zinc-950 overflow-hidden">
                <div class="absolute inset-0 bg-static opacity-20 pointer-events-none"></div>
                <img id="cam-bg" class="absolute inset-0 w-full h-full object-cover opacity-60" src="" alt="">
                <img id="cam-enemy-render" class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 h-[70%] object-contain transition-all" src="" alt="">
                
                <div class="absolute top-4 left-4 flex items-center gap-2 bg-black/50 p-2">
                    <div class="w-3 h-3 bg-red-600 rounded-full animate-blink"></div>
                    <span id="cam-name" class="font-bold text-xl uppercase">CAM 1</span>
                </div>

                <button id="btn-audio-lure" onclick="playAudioLure()" class="touch-btn absolute top-4 right-4 bg-blue-700 px-4 py-2 font-bold border-2 border-white text-sm">LURE AUDIO</button>

                <!-- Close Monitor Button (Visible while in Camera) -->
                <button onclick="toggleCamera()" class="touch-btn absolute bottom-4 left-1/2 -translate-x-1/2 w-48 h-12 bg-zinc-900/80 border-2 border-white font-bold tracking-widest text-sm z-[70]">CLOSE MONITOR</button>
            </div>

            <!-- Map Controls -->
            <div class="h-1/3 bg-zinc-900 p-2 grid grid-cols-3 gap-2 border-t-2 border-gray-700">
                <button onclick="switchCam('CAM1')" id="btn-CAM1" class="touch-btn cam-btn border border-gray-500 bg-black active">CAM 1</button>
                <button onclick="switchCam('CAM2')" id="btn-CAM2" class="touch-btn cam-btn border border-gray-500 bg-black">CAM 2</button>
                <button onclick="switchCam('CAM3')" id="btn-CAM3" class="touch-btn cam-btn border border-gray-500 bg-black">CAM 3</button>
                <button onclick="switchCam('CAM4')" id="btn-CAM4" class="touch-btn cam-btn border border-gray-500 bg-black">CAM 4</button>
                <button onclick="switchCam('CAM5')" id="btn-CAM5" class="touch-btn cam-btn border border-gray-500 bg-black">CAM 5</button>
                <div class="flex items-center justify-center text-xs text-green-500 font-bold border border-green-900/50 bg-green-950/20">YOU</div>
            </div>
        </div>

        <!-- Overlays -->
        <div id="jumpscare-overlay" class="hidden absolute inset-0 z-[200] bg-black items-center justify-center jumpscare-anim">
            <img id="jumpscare-face" class="h-full w-full object-contain" src="" alt="BOO">
        </div>
        <div id="blackout" class="hidden absolute inset-0 bg-black z-[150]"></div>
    </div>

    <script>
        let gameActive = false;
        let power = 100.0;
        let usage = 1;
        let hour = 0;
        let cameraActive = false;
        let currentCam = 'CAM1';
        let isBlackout = false;
        let lureCooldown = false;
        let doors = { left: false, right: false };
        let audioCtx, ambientDrone, fanNoise;

        const mapData = {
            'CAM1': { name: 'CAM 1 - KLASSENRAUM', imageUrl: 'https://raw.githubusercontent.com/zamg0/5nightsatgraphischegame/74461dc8609e8f7f75e684008125c769ebb30f0d/photo-1580582932707-520aed937b7b.avif' },
            'CAM2': { name: 'CAM 2 - FOTOSTUDIO', imageUrl: 'https://raw.githubusercontent.com/zamg0/5nightsatgraphischegame/74461dc8609e8f7f75e684008125c769ebb30f0d/istockphoto-1304724841-612x612.jpg' },
            'CAM3': { name: 'CAM 3 - DRUCKEREI', imageUrl: 'https://raw.githubusercontent.com/zamg0/5nightsatgraphischegame/74461dc8609e8f7f75e684008125c769ebb30f0d/8b-modern-day-offset-printing-heidelberg-speedmaster-sx-102-jennies-photos.jpg' },
            'CAM4': { name: 'CAM 4 - GANG', imageUrl: 'https://raw.githubusercontent.com/zamg0/5nightsatgraphischegame/74461dc8609e8f7f75e684008125c769ebb30f0d/Bild_GLV_CMYK.jpg' },
            'CAM5': { name: 'CAM 5 - PARK', imageUrl: 'https://raw.githubusercontent.com/zamg0/5nightsatgraphischegame/74461dc8609e8f7f75e684008125c769ebb30f0d/RET_IMGP6407.jpg' },
            'LEFT_DOOR': { name: 'LEFT DOOR' },
            'RIGHT_DOOR': { name: 'RIGHT DOOR' },
            'OFFICE': { name: 'OFFICE' }
        };

        const enemies = [
            { 
                id: 'havrest', name: 'Havrest', 
                imageUrl: 'https://raw.githubusercontent.com/zamg0/5nightsatgraphischegame/74461dc8609e8f7f75e684008125c769ebb30f0d/Gemini_Generated_Image_z3shv0z3shv0z3sh-removebg-preview.png', 
                loc: 'CAM1', path: ['CAM1', 'CAM2', 'CAM4', 'LEFT_DOOR', 'OFFICE'], 
                baseAi: 3 
            },
            { 
                id: 'eminger', name: 'Eminger', 
                imageUrl: 'https://raw.githubusercontent.com/zamg0/5nightsatgraphischegame/74461dc8609e8f7f75e684008125c769ebb30f0d/image-removebg-preview.png', 
                loc: 'CAM3', path: ['CAM3', 'CAM5', 'RIGHT_DOOR', 'OFFICE'], 
                baseAi: 5 
            }
        ];

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSynthSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'blip') {
                osc.frequency.setValueAtTime(800, now);
                gain.gain.setValueAtTime(0.05, now);
                osc.start(); osc.stop(now + 0.05);
            } else if (type === 'door') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(100, now);
                gain.gain.setValueAtTime(0.3, now);
                osc.start(); osc.stop(now + 0.2);
            } else if (type === 'lure') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(300, now);
                gain.gain.setValueAtTime(0.1, now);
                osc.start(); osc.stop(now + 0.5);
            } else if (type === 'win') {
                osc.frequency.setValueAtTime(523, now);
                gain.gain.setValueAtTime(0.2, now);
                osc.start(); osc.stop(now + 1);
            }
        }

        function startGame() {
            initAudio();
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('game-container').classList.remove('hidden');
            gameActive = true;
            updateHUD();
            
            setInterval(() => {
                if (!gameActive) return;
                hour++;
                updateHUD();
                if (hour >= 6) winGame();
            }, 30000);

            setInterval(() => {
                if (!gameActive || isBlackout) return;
                usage = 1 + (doors.left ? 1 : 0) + (doors.right ? 1 : 0) + (cameraActive ? 1 : 0);
                power -= (0.15 * usage);
                if (power <= 0) triggerBlackout();
                updateHUD();
            }, 1000);

            setInterval(() => {
                if (!gameActive || isBlackout) return;
                moveEnemies();
            }, 4000);
        }

        function toggleDoor(side) {
            if (isBlackout) return;
            doors[side] = !doors[side];
            const doorEl = document.getElementById(`door-${side}`);
            const ctrlEl = document.getElementById(`ctrl-${side}`);
            
            if (doors[side]) {
                doorEl.classList.replace('door-open', 'door-closed');
                ctrlEl.classList.replace('bg-red-900/40', 'bg-green-600/60');
                ctrlEl.classList.replace('border-red-500', 'border-green-400');
            } else {
                doorEl.classList.replace('door-closed', 'door-open');
                ctrlEl.classList.replace('bg-green-600/60', 'bg-red-900/40');
                ctrlEl.classList.replace('border-green-400', 'border-red-500');
            }
            playSynthSound('door');
        }

        function toggleCamera() {
            if (isBlackout) return;
            cameraActive = !cameraActive;
            const camSys = document.getElementById('camera-system');
            camSys.classList.toggle('cam-hidden');
            camSys.classList.toggle('cam-visible');
            if (cameraActive) renderCamView();
            playSynthSound('blip');
        }

        function switchCam(camId) {
            currentCam = camId;
            document.querySelectorAll('.cam-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${camId}`).classList.add('active');
            document.getElementById('cam-name').innerText = mapData[camId].name;
            document.getElementById('cam-bg').src = mapData[camId].imageUrl;
            renderCamView();
            playSynthSound('blip');
        }

        function playAudioLure() {
            if (lureCooldown || isBlackout) return;
            playSynthSound('lure');
            lureCooldown = true;
            const btn = document.getElementById('btn-audio-lure');
            btn.classList.add('opacity-50');
            btn.innerText = 'WAIT...';
            
            setTimeout(() => {
                lureCooldown = false;
                btn.classList.remove('opacity-50');
                btn.innerText = 'LURE AUDIO';
            }, 6000);

            enemies.forEach(e => {
                let tIdx = e.path.indexOf(currentCam);
                let cIdx = e.path.indexOf(e.loc);
                if (tIdx !== -1 && cIdx !== -1 && Math.abs(tIdx - cIdx) === 1) e.loc = currentCam;
            });
            renderCamView();
        }

        function moveEnemies() {
            enemies.forEach(e => {
                if (Math.random() * 20 < (e.baseAi + hour)) {
                    let idx = e.path.indexOf(e.loc);
                    if (idx < e.path.length - 1) {
                        let next = e.path[idx + 1];
                        if (next === 'LEFT_DOOR' && doors.left) { e.loc = 'CAM4'; return; }
                        if (next === 'RIGHT_DOOR' && doors.right) { e.loc = 'CAM5'; return; }
                        if (next === 'OFFICE') { triggerJumpscare(e); return; }
                        e.loc = next;
                    }
                }
            });
            checkOfficeDoors();
            if (cameraActive) renderCamView();
        }

        function checkOfficeDoors() {
            const lEl = document.getElementById('left-enemy');
            const rEl = document.getElementById('right-enemy');
            let lOcc = enemies.find(e => e.loc === 'LEFT_DOOR');
            let rOcc = enemies.find(e => e.loc === 'RIGHT_DOOR');

            if (lOcc && !doors.left) { lEl.src = lOcc.imageUrl; lEl.classList.remove('hidden'); lEl.style.opacity = 1; }
            else { lEl.classList.add('hidden'); lEl.style.opacity = 0; }
            
            if (rOcc && !doors.right) { rEl.src = rOcc.imageUrl; rEl.classList.remove('hidden'); rEl.style.opacity = 1; }
            else { rEl.classList.add('hidden'); rEl.style.opacity = 0; }
        }

        function renderCamView() {
            const r = document.getElementById('cam-enemy-render');
            let occ = enemies.find(e => e.loc === currentCam);
            if (occ) { r.src = occ.imageUrl; r.style.opacity = 1; }
            else { r.style.opacity = 0; }
        }

        function updateHUD() {
            const pEl = document.getElementById('power-display');
            pEl.innerText = `${Math.ceil(Math.max(0, power))}%`;
            document.getElementById('time-display').innerText = `${hour === 0 ? 12 : hour}:00 AM`;
            let uStr = '';
            for(let i=0; i<4; i++) uStr += `<div class="w-3 h-4 ${i < usage ? 'bg-green-500' : 'bg-gray-800'}"></div>`;
            document.getElementById('usage-display').innerHTML = uStr;
            if (power <= 20) pEl.classList.add('text-red-500', 'animate-pulse');
        }

        function triggerBlackout() {
            isBlackout = true; gameActive = true; 
            power = 0; updateHUD();
            document.getElementById('blackout').classList.remove('hidden');
            if(cameraActive) toggleCamera();
            setTimeout(() => triggerJumpscare(enemies[0]), 5000);
        }

        function triggerJumpscare(enemy) {
            gameActive = false;
            const o = document.getElementById('jumpscare-overlay');
            document.getElementById('jumpscare-face').src = enemy.imageUrl;
            o.classList.remove('hidden'); o.classList.add('flex');
            setTimeout(() => location.reload(), 3000);
        }

        function winGame() {
            gameActive = false;
            document.getElementById('win-screen').classList.remove('hidden');
        }

        window.addEventListener('touchstart', initAudio, { once: true });
    </script>
</body>
</html>
